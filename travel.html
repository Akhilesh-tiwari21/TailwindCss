<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Travel</title>
</head>
<body class="h-screen bg-gray-50">
    <nav class="h-16 px-6 md:px-20 flex items-center justify-between mt-6 font-serif text-green-900">
    <div class="text-xl md:text-2xl font-semibold">
        Logotravel
    </div>

    <!-- Mobile Menu Hidden -->
    <div class="hidden md:block">
        <ul class="flex space-x-10 lg:space-x-30 text-lg md:text-xl">
            <li class="hover:text-green-500 transition duration-300 cursor-pointer">About</li>
            <li class="hover:text-green-500 transition duration-300 cursor-pointer">Destination</li>
            <li class="hover:text-green-500 transition duration-300 cursor-pointer">Booking</li>
            <li class="hover:text-green-500 transition duration-300 cursor-pointer">Contact</li>
        </ul>
    </div>
</nav>

<!-- MAIN SECTION -->
<div class="main flex flex-col md:flex-row items-center gap-10 px-6 md:px-20 mt-10">
    <!-- LEFT -->
    <div class="left font-[orbitron] text-center md:text-left animate-fadeIn">
        <div class="text-green-900">
            <span class="font-semibold text-4xl sm:text-5xl md:text-6xl lg:text-7xl">Around</span>
            <span class="font-semibold text-4xl sm:text-5xl md:text-6xl lg:text-7xl"> The</span><br/>
            <span class="font-semibold text-4xl sm:text-5xl md:text-6xl lg:text-7xl">World</span>
        </div>
        <div class="mt-6 max-w-xl mx-auto md:mx-0">
            <p class="text-base sm:text-lg md:text-xl text-green-900">
                Travelling is an invaluable, invigorating experience that broadens horizons by exposing individuals to new cultures, languages, and perspectives firsthand.
            </p>
        </div>
        <button class="bg-green-400 hover:bg-green-600 px-5 py-2 rounded mt-8 text-white transition duration-300 transform hover:scale-105">
            READ MORE
        </button>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="right flex justify-center animate-zoomIn">
        <img src="./assest/travel.jpg"
            class="h-60 w-60 sm:h-72 sm:w-72 md:h-80 md:w-80 rounded-full border-[12px] border-orange-700 shadow-lg transition duration-500 hover:scale-110">
    </div>

</div>
</body>
</html>
